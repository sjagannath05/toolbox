# Template: drop this into a PRIVATE project repo's .github/workflows/ to
# publish its release binaries into the public sjagannath05/toolbox repo.
#
# Auth: GitHub App "toolbox-publisher" (App ID 4264029) — mints a fresh
# 1-hour token per run; nothing to rotate. Validated end-to-end 2026-07-10.
#
# Setup (once per private repo):
#   Settings → Secrets and variables → Actions → New repository secret:
#     TOOLBOX_APP_ID          = 4264029
#     TOOLBOX_APP_PRIVATE_KEY = full contents of the app's .pem file
#   Then set TOOL_NAME below (must match the folder name in toolbox).
#
# Tagging convention in the private repo: plain v0.7.0 tags.
# This job re-publishes to toolbox as <tool>-v0.7.0.

name: Publish to toolbox

on:
  release:
    types: [published]   # fires when you publish a release in the private repo
  workflow_dispatch:      # or run manually
    inputs:
      tag:
        description: "Version tag to republish (e.g. v0.7.0)"
        required: true

env:
  TOOL_NAME: diffdesk    # ← change per repo

jobs:
  publish-to-toolbox:
    runs-on: ubuntu-latest
    steps:
      - name: Mint toolbox token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.TOOLBOX_APP_ID }}
          private-key: ${{ secrets.TOOLBOX_APP_PRIVATE_KEY }}
          owner: sjagannath05
          repositories: toolbox

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "public_tag=${TOOL_NAME}-${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download release assets from this (private) repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" --dir assets

      - name: Generate SHA256SUMS
        run: |
          cd assets && shasum -a 256 * > SHA256SUMS

      - name: Publish to sjagannath05/toolbox
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.tag.outputs.public_tag }}" \
            --repo sjagannath05/toolbox \
            --title "${TOOL_NAME} ${{ steps.tag.outputs.tag }}" \
            --notes "${{ github.event.release.body || 'See changelog in the tool folder.' }}" \
            assets/*
