# Keeps the "Latest" column in the root README in sync.
# Fires whenever a release (tagged <tool>-v<version>) is published on this repo.

name: Update index

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to index (e.g. diffdesk-v0.7.0)"
        required: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # release events check out the tag (detached HEAD); we need the branch

      - name: Update Latest column
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"  # e.g. diffdesk-v0.7.0
          TOOL="${TAG%-v*}"                                          # diffdesk
          VERSION="v${TAG##*-v}"                                     # v0.7.0
          URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          # Replace content between the per-tool markers in README.md
          perl -0pi -e \
            "s|<!-- latest:${TOOL} -->.*?<!-- /latest:${TOOL} -->|<!-- latest:${TOOL} -->[${VERSION}](${URL})<!-- /latest:${TOOL} -->|s" \
            README.md

      - name: Commit
        run: |
          git config user.name "toolbox-bot"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "index: ${{ github.event.release.tag_name || inputs.tag }}"
          git push origin main
